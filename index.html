<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Shorts Generator</title>
    <style>
        :root { --primary: #6366f1; --bg-dark: #0f172a; --text-light: #f8fafc; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { display: flex; gap: 40px; max-width: 1000px; width: 100%; flex-wrap: wrap; justify-content: center; }
        .input-section { flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 12px; }
        
        /* New styling for inputs */
        input, select, textarea { width: 100%; background: #1e293b; color: white; border: 2px solid #334155; border-radius: 8px; padding: 12px; font-size: 14px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }
        
        .api-box { background: #1e1b4b; padding: 15px; border-radius: 8px; border: 1px solid #4f46e5; margin-bottom: 10px; }
        .api-box label { font-size: 12px; color: #a5b4fc; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 5px;}
        button { flex: 1; background: var(--primary); color: white; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #4f46e5; transform: translateY(-2px); }
        .generate-btn { background: var(--success); }
        .generate-btn:hover { background: #059669; }
        .record-btn { background: #e11d48; }
        .record-btn:hover { background: #be123c; }
        
        /* Video Screen */
        .video-screen { width: 315px; height: 560px; background: linear-gradient(135deg, #1e1b4b, #312e81); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; position: relative; overflow: hidden; border: 4px solid #334155; box-sizing: border-box; }
        .dynamic-text { font-size: 32px; font-weight: 800; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); margin-bottom: 20px; animation: popIn 0.3s ease-out; }
        .dynamic-emoji { font-size: 60px; animation: floatUp 0.5s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes floatUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="input-section">
            <h2>⚡ AI Content Generator</h2>
            
            <div class="api-box">
                <label>Google Gemini API Key (Required for AI generation)</label>
                <input type="password" id="apiKey" placeholder="AIzaSyDkfJd_OzIBDtvggagC1qplwWxumSCtc6c">
            </div>

            <select id="contentTopic">
                <option value="motivation">Motivation & Success</option>
                <option value="finance">Finance, Stock Market & SIPs</option>
                <option value="jokes">Funny Joke or Pun</option>
            </select>

            <button class="generate-btn" onclick="generateScript()">✨ Generate AI Script</button>
            
            <textarea id="storyText" placeholder="Your script will appear here..."></textarea>
            
            <div class="btn-group">
                <button onclick="startVideo()">▶️ Preview</button>
                <button class="record-btn" onclick="startRecording()">🔴 Record Video</button>
            </div>
        </div>

        <div class="video-screen" id="videoScreen">
            <div class="dynamic-emoji" id="emojiDisplay">🚀</div>
            <div class="dynamic-text" id="textDisplay">Ready...</div>
        </div>
    </div>

    <script>
        // Expanded dictionary for finance, motivation, and jokes
        const emojiMap = {
            "money": "💸", "invest": "📈", "sip": "🏦", "stock": "📉", "market": "🐂", 
            "wealth": "💰", "rich": "💎", "profit": "💵", "trading": "📊",
            "grind": "💪", "success": "🏆", "hustle": "🔥", "focus": "🧠",
            "goal": "🎯", "win": "🏅", "fail": "❌", "learn": "📚",
            "joke": "😂", "laugh": "🤣", "funny": "🤡", "smile": "😊"
        };

        let synthesis = window.speechSynthesis;
        let isPlaying = false;
        let mediaRecorder;
        let recordedChunks = [];

        // --- NEW: AI Generation Function ---
        async function generateScript() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const topic = document.getElementById('contentTopic').value;
            const textArea = document.getElementById('storyText');

            if (!apiKey) {
                alert("Please enter your Gemini API Key first!");
                return;
            }

            textArea.value = "Generating... Please wait ⏳";

            // Crafting the prompt based on the selected topic
            let prompt = "";
            if (topic === "motivation") {
                prompt = "Write a highly motivational, punchy 30-word script for a YouTube Short. No hashtags, no stage directions, just the spoken text.";
            } else if (topic === "finance") {
                prompt = "Write a quick, educational 30-word script about investing, SIPs, or the stock market for a YouTube Short. Make it engaging. No hashtags, no stage directions.";
            } else if (topic === "jokes") {
                prompt = "Tell a clean, funny, 30-word joke suitable for a quick YouTube Short. No hashtags, no stage directions.";
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                // Extract the generated text and put it in the text area
                const generatedText = data.candidates[0].content.parts[0].text;
                textArea.value = generatedText.trim();

            } catch (error) {
                console.error("API Error:", error);
                textArea.value = "Error generating script. Check your API key and try again.";
            }
        }

        // --- Recording Function (Same as before) ---
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: { displaySurface: "browser" }, audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none'; a.href = url; a.download = 'AI_Short_Video.webm';
                    document.body.appendChild(a); a.click(); URL.revokeObjectURL(url);
                    recordedChunks = []; stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start(); startVideo(true); 
            } catch (err) { alert("Recording cancelled or permissions denied."); }
        }

        // --- Video Playback Function (Same as before) ---
        function startVideo(isRecording = false) {
            if (isPlaying) synthesis.cancel();
            const rawText = document.getElementById('storyText').value;
            if (!rawText.trim()) return alert("Please enter a story!");

            const words = rawText.split(/\s+/);
            const textDisplay = document.getElementById('textDisplay');
            const emojiDisplay = document.getElementById('emojiDisplay');
            
            const utterance = new SpeechSynthesisUtterance(rawText);
            utterance.rate = 1.0; 
            let wordIndex = 0;

            utterance.onboundary = (event) => {
                if (event.name === 'word' && wordIndex < words.length) {
                    let currentWord = words[wordIndex];
                    let cleanWord = currentWord.toLowerCase().replace(/[^a-z]/g, ""); 
                    
                    textDisplay.textContent = currentWord;
                    emojiDisplay.textContent = emojiMap[cleanWord] ? emojiMap[cleanWord] : "✨";
                    
                    emojiDisplay.style.animation = 'none'; emojiDisplay.offsetHeight; emojiDisplay.style.animation = 'floatUp 0.5s ease-out'; 
                    textDisplay.style.animation = 'none'; textDisplay.offsetHeight; textDisplay.style.animation = 'popIn 0.3s ease-out';
                    wordIndex++;
                }
            };

            utterance.onend = () => {
                isPlaying = false; textDisplay.textContent = "Done!"; emojiDisplay.textContent = "✅";
                if (isRecording && mediaRecorder && mediaRecorder.state !== "inactive") { setTimeout(() => mediaRecorder.stop(), 1000); }
            };

            isPlaying = true; synthesis.speak(utterance);
        }
    </script>
</body>
</html>
